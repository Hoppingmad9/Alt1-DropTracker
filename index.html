<html>
  <head>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://runeapps.org/nis/nis.css"
    />
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://runeapps.org/runeappslib.css"
    />
    <script src="https://www.unpkg.com/alt1/dist/base/index.js"></script>
    <script src="https://www.unpkg.com/alt1/dist/ocr/index.js"></script>
    <script src="https://www.unpkg.com/alt1/dist/chatbox/index.js"></script>
  </head>

  <body>
    <div class="app">
      <section id="dropsPanel" class="drops-panel">
        <div class="panel-header">
          <div class="panel-title-wrap">
            <h2>Tracked Drops</h2>
            <p id="statusText">Waiting to start...</p>
          </div>

          <div class="panel-actions">
            <button id="startBtn" type="button">Start</button>
            <button id="stopBtn" type="button">Stop</button>
            <button id="openSettingsBtn" type="button">Settings</button>
            <button id="clearHistoryBtn" type="button">Clear History</button>
          </div>
        </div>

        <div id="emptyState" class="empty-state">No drops tracked yet.</div>

        <div class="drops-table-scroll">
          <table id="dropsTable" class="drops-table">
            <thead>
              <tr>
                <th class="col-time">Time</th>
                <th class="col-item">Item</th>
                <th class="col-status">Status</th>
              </tr>
            </thead>
            <tbody id="dropsTableBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <div
      id="settingsModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="settingsTitle"
    >
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="settingsTitle">Settings</h2>
          <button
            id="closeSettingsBtn"
            type="button"
            aria-label="Close settings"
          >
            ×
          </button>
        </div>

        <div class="modal-body">
          <div class="setting-group">
            <label for="chatSelect" class="setting-label">Selected chat</label>
            <div class="chat-controls">
              <select id="chatSelect">
                <option value="">Select Chat</option>
              </select>
              <button id="refreshChatsBtn" type="button">Refresh Chats</button>
            </div>
            <p class="help-text">
              Make sure timestamps are visible in the chosen chatbox.
            </p>
          </div>
          <div class="setting-group">
            <label>
              <input type="checkbox" id="trackEnabled" checked />
              Enable drop tracking
            </label>
          </div>

          <div class="setting-group">
            <div class="setting-label">Watch mode</div>

            <label>
              <input
                type="radio"
                name="trackMode"
                id="trackModeAll"
                value="all"
                checked
              />
              Alert for all drops
            </label>

            <label>
              <input
                type="radio"
                name="trackMode"
                id="trackModeWatchlist"
                value="watchlist"
              />
              Alert only for watched drops
            </label>
          </div>

          <div class="setting-group">
            <label for="watchlistItems" class="setting-label"
              >Watched drops (one per line)</label
            >
            <textarea
              id="watchlistItems"
              rows="8"
              placeholder="Noxious scythe&#10;Torva platebody&#10;Hazelmere's signet ring"
            ></textarea>
          </div>

          <div class="setting-group">
            <label for="alertSeconds" class="setting-label"
              >Alert delay (seconds)</label
            >
            <input id="alertSeconds" type="number" min="1" max="60" value="8" />
          </div>

          <div class="setting-group">
            <label>
              <input type="checkbox" id="playSound" checked />
              Play sound on missed pickup
            </label>
          </div>

          <div class="setting-group">
            <label>
              <input type="checkbox" id="showResolved" checked />
              Show resolved pickups in history
            </label>
          </div>
        </div>

        <div class="modal-footer">
          <button id="saveSettingsBtn" type="button">Save Settings</button>
        </div>
      </div>
    </div>
  </body>
  <script src="scripts/script.js"></script>
</html>
